<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洋流专题学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(180deg, #1e3a8a 0%, #0c4a6e 50%, #164e63 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ocean-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .ocean-header {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #334155;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .back-home-btn {
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            border: 3px solid #1e293b;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .back-home-btn:hover {
            background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
            transform: translateY(-2px);
        }

        .header-title h1 {
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .ocean-main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .module-select-content {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        .ocean-title {
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        }

        .ocean-subtitle {
            font-size: 20px;
            color: #bfdbfe;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .module-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #3b82f6;
            border-radius: 20px;
            padding: 35px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .module-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.4);
            border-color: #60a5fa;
        }

        .explore-module {
            border-color: #8b5cf6;
        }

        .explore-module:hover {
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4);
            border-color: #a78bfa;
        }

        .module-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .explore-module .module-badge {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .module-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .module-card h2 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 15px;
        }

        .module-desc {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .module-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .feature-item {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #1e40af;
            border: 2px solid #3b82f6;
        }

        .explore-module .feature-item {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-color: #8b5cf6;
            color: #6d28d9;
        }

        .module-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
        }

        .module-info span {
            font-size: 14px;
            color: #475569;
            font-weight: bold;
        }

        .module-btn {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            border: 3px solid #1e293b;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.3);
        }

        .module-btn:hover {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .explore-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        }

        .explore-btn:hover {
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
        }

        .learning-tips {
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #fbbf24;
            border-radius: 16px;
            padding: 25px;
            max-width: 800px;
            margin: 0 auto;
        }

        .learning-tips h3 {
            font-size: 22px;
            color: #92400e;
            margin-bottom: 12px;
        }

        .learning-tips p {
            font-size: 16px;
            color: #451a03;
            line-height: 1.8;
        }

        .learning-tips strong {
            color: #7c2d12;
            background: #fef3c7;
            padding: 2px 6px;
            border-radius: 4px;
        }

        @media (max-width: 1000px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="ocean-container">
        <header class="ocean-header">
            <button class="back-home-btn" id="back-home">🏠 返回主页</button>
            <div class="header-title">
                <h1>🌊 洋流专题学习</h1>
            </div>
        </header>

        <main class="ocean-main">
            <div class="module-select-content">
                <h1 class="ocean-title">🌊 洋流专题学习</h1>
                <p class="ocean-subtitle">探索海洋奥秘，掌握洋流知识</p>
                
                <div class="modules-grid">
                    <!-- 探究式学习模块 -->
                    <div class="module-card explore-module" id="explore-module">
                        <div class="module-badge">推荐先学</div>
                        <div class="module-icon">🔬</div>
                        <h2>探究式学习</h2>
                        <p class="module-desc">像科学家一样探索洋流奥秘</p>
                        <div class="module-features">
                            <div class="feature-item">🌡️ 观察实验</div>
                            <div class="feature-item">🗺️ 地图探索</div>
                            <div class="feature-item">💡 推理发现</div>
                            <div class="feature-item">📊 数据分析</div>
                        </div>
                        <div class="module-info">
                            <span class="duration">⏱️ 约30分钟</span>
                            <span class="difficulty">难度: ⭐⭐⭐</span>
                        </div>
                        <button class="module-btn explore-btn">开始探究</button>
                    </div>
                    
                    <!-- 洋流大冒险模块 -->
                    <div class="module-card adventure-module" id="adventure-module">
                        <div class="module-badge">巩固检验</div>
                        <div class="module-icon">🚢</div>
                        <h2>洋流大冒险</h2>
                        <p class="module-desc">驾驶小船，通过答题检验学习成果</p>
                        <div class="module-features">
                            <div class="feature-item">🎮 5个关卡</div>
                            <div class="feature-item">📝 98道题目</div>
                            <div class="feature-item">⭐ 星级评价</div>
                            <div class="feature-item">💎 收集宝石</div>
                        </div>
                        <div class="module-info">
                            <span class="duration">⏱️ 约20分钟</span>
                            <span class="difficulty">难度: ⭐⭐</span>
                        </div>
                        <button class="module-btn adventure-btn">开始冒险</button>
                    </div>
                </div>
                
                <div class="learning-tips">
                    <h3>💡 学习建议</h3>
                    <p>建议先完成<strong>探究式学习</strong>，深入理解洋流知识，再通过<strong>洋流大冒险</strong>巩固和检验学习成果。</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 返回主页
        document.getElementById('back-home').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // 探究式学习
        document.getElementById('explore-module').addEventListener('click', () => {
            window.location.href = 'ocean-explore.html';
        });
        
        document.querySelector('.explore-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            window.location.href = 'ocean-explore.html';
        });
        
        // 洋流大冒险
        document.getElementById('adventure-module').addEventListener('click', () => {
            window.location.href = 'ocean-adventure.html';
        });
        
        document.querySelector('.adventure-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            window.location.href = 'ocean-adventure.html';
        });
    </script>
</body>
</html>
